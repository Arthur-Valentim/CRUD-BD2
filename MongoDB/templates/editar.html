<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Registro - Empresa Flora</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        form { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: bold; color: #333; margin-top: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        input[readonly] { background-color: #eee; cursor: not-allowed; }
        h3 { color: #34495e; font-size: 16px; margin-top: 15px; margin-bottom: 5px; }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; flex: 1; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .btn-cancel { background-color: #95a5a6; color: white; text-align: center; text-decoration: none; padding: 10px 20px; border-radius: 4px; flex: 1; font-weight: bold; }
        .btn-cancel:hover { background-color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Atualizar {{ tipo|capitalize }}</h1>
        
        {% if tipo == 'cliente' %}
        <form action="/editar_cliente/{{ item.cnpj }}" method="POST">
            <label>CNPJ</label> <input type="text" name="cnpj" value="{{ item.cnpj }}" readonly>
            <label>Razão Social</label> <input type="text" name="razao_social" value="{{ item.razao_social }}" required>
            <label>Nome Fantasia</label> <input type="text" name="nome_fantasia" value="{{ item.nome_fantasia }}" required>
            <label>Telefone</label> <input type="text" name="telefone" value="{{ item.telefone }}" required>
            <h3>Endereço</h3>
            <label>Logradouro</label> <input type="text" name="logradouro" value="{{ item.endereco.logradouro }}" required>
            <label>Número</label> <input type="text" name="numero" value="{{ item.endereco.numero }}" required>
            <label>Complemento</label> <input type="text" name="complemento" value="{{ item.endereco.complemento }}">
            <label>Bairro</label> <input type="text" name="bairro" value="{{ item.endereco.bairro }}" required>
            <label>CEP</label> <input type="text" name="cep" value="{{ item.endereco.cep }}" required>
            <label>Cidade</label> <input type="text" name="cidade" value="{{ item.endereco.cidade }}" required>
            <label>Estado</label> <input type="text" name="estado" value="{{ item.endereco.estado }}" required>
            <div class="btn-container"><button type="submit">Salvar Alterações</button><a href="/" class="btn-cancel">Cancelar</a></div>
        </form>

        {% elif tipo == 'funcionario' %}
        <form action="/editar_funcionario/{{ item.matricula }}" method="POST">
            <label>Matrícula</label> <input type="text" name="matricula" value="{{ item.matricula }}" readonly>
            <label>CPF</label> <input type="text" name="cpf" value="{{ item.cpf }}" required>
            <label>Nome</label> <input type="text" name="nome" value="{{ item.nome }}" required>
            <label>Telefone</label> <input type="text" name="telefone" value="{{ item.telefone }}" required>
            <label>Turno Atual: {{ item.turno }}</label>
            <select name="turno" required>
                <option value="Manhã - 08h às 12h">Manhã (08h00min às 12h00min)</option>
                <option value="Tarde - 12h às 16h">Tarde (12h00min às 16h00min)</option>
                <option value="Noite - 16h às 20h">Noite (16h00min às 20h00min)</option>
            </select>
            <h3>Endereço</h3>
            <label>Logradouro</label> <input type="text" name="logradouro" value="{{ item.endereco.logradouro }}" required>
            <label>Número</label> <input type="text" name="numero" value="{{ item.endereco.numero }}" required>
            <label>Complemento</label> <input type="text" name="complemento" value="{{ item.endereco.complemento }}">
            <label>Bairro</label> <input type="text" name="bairro" value="{{ item.endereco.bairro }}" required>
            <label>CEP</label> <input type="text" name="cep" value="{{ item.endereco.cep }}" required>
            <label>Cidade</label> <input type="text" name="cidade" value="{{ item.endereco.cidade }}" required>
            <label>Estado</label> <input type="text" name="estado" value="{{ item.endereco.estado }}" required>
            <div class="btn-container"><button type="submit">Salvar Alterações</button><a href="/" class="btn-cancel">Cancelar</a></div>
        </form>

        {% elif tipo == 'fornecedor' %}
        <form action="/editar_fornecedor/{{ item.cnpj }}" method="POST">
            <label>CNPJ</label> <input type="text" name="cnpj" value="{{ item.cnpj }}" readonly>
            <label>Razão Social</label> <input type="text" name="razao_social" value="{{ item.razao_social }}" required>
            <label>Nome Fantasia</label> <input type="text" name="nome_fantasia" value="{{ item.nome_fantasia }}" required>
            <label>Telefone</label> <input type="text" name="telefone" value="{{ item.telefone }}" required>
            <h3>Endereço</h3>
            <label>Logradouro</label> <input type="text" name="logradouro" value="{{ item.endereco.logradouro }}" required>
            <label>Número</label> <input type="text" name="numero" value="{{ item.endereco.numero }}" required>
            <label>Complemento</label> <input type="text" name="complemento" value="{{ item.endereco.complemento }}">
            <label>Bairro</label> <input type="text" name="bairro" value="{{ item.endereco.bairro }}" required>
            <label>CEP</label> <input type="text" name="cep" value="{{ item.endereco.cep }}" required>
            <label>Cidade</label> <input type="text" name="cidade" value="{{ item.endereco.cidade }}" required>
            <label>Estado</label> <input type="text" name="estado" value="{{ item.endereco.estado }}" required>
            <h3>Catálogo</h3>
            <label>Lista de Materiais</label> <input type="text" name="lista_materiais" value="{{ item.lista_materiais }}" required>
            <label>Descrição dos Materiais</label> <input type="text" name="descricao_materiais" value="{{ item.descricao_materiais }}" required>
            <div class="btn-container"><button type="submit">Salvar Alterações</button><a href="/" class="btn-cancel">Cancelar</a></div>
        </form>

        {% elif tipo == 'material' %}
        <form action="/editar_material/{{ item.codigo }}" method="POST">
            <label>Código do Material</label> <input type="text" name="codigo" value="{{ item.codigo }}" readonly>
            <label>Nome</label> <input type="text" name="nome" value="{{ item.nome }}" required>
            <label>Preço Unitário</label> <input type="number" step="0.01" name="preco_unitario" value="{{ item.preco_unitario }}" required>
            <label>Unidade</label> <input type="text" name="unidade" value="{{ item.unidade }}" required>
            <label>Preço com Desconto</label> <input type="number" step="0.01" name="preco_desconto" value="{{ item.preco_desconto }}" required>
            <label>Qtd Mínima para Desconto</label> <input type="number" name="qtd_minima" value="{{ item.qtd_minima }}" required>
            <div class="btn-container"><button type="submit">Salvar Alterações</button><a href="/" class="btn-cancel">Cancelar</a></div>
        </form>

        {% elif tipo == 'especialidade' %}
        <form action="/editar_especialidade/{{ item.codigo }}" method="POST">
            <label>Código da Especialidade</label> <input type="text" name="codigo" value="{{ item.codigo }}" readonly>
            <label>Nome da Especialidade</label> <input type="text" name="nome" value="{{ item.nome }}" required>
            <label>Custo-Hora</label> <input type="number" step="0.01" name="custo_hora" value="{{ item.custo_hora }}" required>
            <div class="btn-container"><button type="submit">Salvar Alterações</button><a href="/" class="btn-cancel">Cancelar</a></div>
        </form>
        {% endif %}
    </div>
</body>
</html>
